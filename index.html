<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Netflix Home</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      background-color: #141414;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* =========================
       NAVBAR
    ========================= */

    .navbar {

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 0 20px;

      background: rgba(0, 0, 0, 0.9);

      position: fixed;

      top: 0;

      width: 100%;

      z-index: 1000;

      height: 70px;
    }

    .navbar img {

      height: 35px;
      flex-shrink: 0;
    }

    .nav-links {

      display: flex;
      align-items: center;
      gap: 20px;

      overflow-x: auto;

      scrollbar-width: none;
    }

    .nav-links::-webkit-scrollbar {

      display: none;
    }

    .nav-links a {

      color: white;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;

      transition: 0.3s;
    }

    .nav-links a:hover {

      color: #b3b3b3;
    }

    /* =========================
       NETFLIX BUDDY BUTTON
    ========================= */

    .netflix-buddy-btn {

      background-color: #e50914;
      color: white;

      padding: 10px 18px;

      border: none;

      border-radius: 6px;

      cursor: pointer;

      font-size: 14px;

      font-weight: bold;

      white-space: nowrap;

      transition: 0.3s;
    }

    .netflix-buddy-btn:hover {

      background-color: #ff1f1f;
      transform: scale(1.05);
    }

    /* =========================
       BANNER
    ========================= */

    .banner {

      position: relative;

      min-height: 90vh;

      background-image:
      url('https://mir-s3-cdn-cf.behance.net/project_modules/hd/fb762791877129.5e3cb3903fb67.gif');

      background-size: cover;

      background-position: center;

      background-repeat: no-repeat;

      display: flex;

      align-items: flex-end;

      padding: 80px 40px;

      margin-top: 70px;
    }

    .banner::after {

      content: "";

      position: absolute;

      inset: 0;

      background: linear-gradient(
        to top,
        #141414 5%,
        transparent 60%
      );
    }

    .banner-content {

      position: relative;

      z-index: 2;

      max-width: 600px;
    }

    .banner-content h1 {

      font-size: 4rem;

      margin-bottom: 15px;
    }

    .banner-content p {

      line-height: 1.7;

      font-size: 1rem;

      margin-bottom: 25px;
    }

    .banner-buttons {

      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .banner-buttons button {

      padding: 12px 24px;

      border: none;

      font-size: 1rem;

      cursor: pointer;

      border-radius: 4px;

      transition: 0.3s;
    }

    .play-button {

      background-color: white;
      color: black;
      font-weight: bold;
    }

    .play-button:hover {

      background-color: #d9d9d9;
    }

    .info-button {

      background-color: rgba(109, 109, 110, 0.7);
      color: white;
    }

    .info-button:hover {

      background-color: rgba(109, 109, 110, 1);
    }

    /* =========================
       MOVIE ROWS
    ========================= */

    .movie-row {

      padding: 25px 40px;
    }

    .movie-row h2 {

      margin-bottom: 15px;

      font-size: 22px;
    }

    .movie-thumbnails {

      display: flex;

      overflow-x: auto;

      gap: 12px;

      scroll-behavior: smooth;

      padding-bottom: 10px;
    }

    .movie-thumbnails::-webkit-scrollbar {

      display: none;
    }

    .movie-thumbnails img {

      width: 240px;

      height: 135px;

      object-fit: cover;

      border-radius: 6px;

      transition: transform 0.3s ease;

      cursor: pointer;

      flex-shrink: 0;
    }

    .movie-thumbnails img:hover {

      transform: scale(1.08);
    }

    /* =========================
       MOBILE RESPONSIVE
    ========================= */

    @media (max-width: 768px) {

      .navbar {

        padding: 0 12px;
      }

      .navbar img {

        height: 28px;
      }

      .nav-links {

        gap: 14px;

        margin-left: 10px;
      }

      .nav-links a {

        font-size: 13px;
      }

      .netflix-buddy-btn {

        padding: 8px 12px;

        font-size: 12px;
      }

      .banner {

        min-height: 75vh;

        padding: 40px 20px;

        background-position: top center;
      }

      .banner-content {

        max-width: 100%;
      }

      .banner-content h1 {

        font-size: 3rem;

        line-height: 1.1;
      }

      .banner-content p {

        font-size: 15px;

        line-height: 1.6;
      }

      .banner-buttons {

        flex-direction: column;
      }

      .banner-buttons button {

        width: 100%;
      }

      .movie-row {

        padding: 20px;
      }

      .movie-row h2 {

        font-size: 20px;
      }

      .movie-thumbnails img {

        width: 170px;

        height: 95px;
      }
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <img
      src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png"
      alt="Netflix Logo"
    >

    <div class="nav-links">

      <a href="#">Home</a>
      <a href="#">TV Shows</a>
      <a href="#">Movies</a>
      <a href="#">New & Popular</a>
      <a href="#">My List</a>

      <button
        class="netflix-buddy-btn"
        onclick="openBuddy()"
      >
        Netflix Buddy
      </button>

    </div>
  </div>

  <!-- BANNER -->

  <section class="banner">

    <div class="banner-content">

      <p>
        Marvel's Daredevil follows blind lawyer Matt Murdock as he fights crime
        in Hell's Kitchen while confronting powerful enemies and corruption.
      </p>

      <div class="banner-buttons">

        <button class="play-button">

        <button class="info-button">

  </section>

      <img src="https://www.milesweb.in/blog/wp-content/uploads/2021/09/10-insightful-Business-Growth-Learnings-From-Money-Heist.jpg">

      <img src="https://occ-0-8407-90.1.nflxso.net/dnm/api/v6/9pS1daC2n6UGc3dUogvWIPMR_OU/AAAABf042BY_CTTHxRxF0YjpmOfF4I5g_ZP_C26xORkZ9S1BgoNdq9rEqWdaZLMMarAZMuj9RHKsXLafdAELsS1o1yf4aPBgYo6aIPQcdDwOB-DuO2VmvmCmcsLRDg.jpg?r=7b6">

      <img src="https://picfiles.alphacoders.com/170/170956.jpg">

      <img src="https://static1.colliderimages.com/wordpress/wp-content/uploads/2024/04/the-10-best-peaky-blinders-episodes-ranked.jpg">

    </div>
  </div>

  <!-- JAVASCRIPT -->

  <script>

    function openBuddy() {

      window.location.href = "buddy.html";
    }

  </script>

</body>
</html>
